<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add New Participant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        input[readonly] {
            background-color: #f8f9fa !important;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="bg-light p-4">

{% include 'partials/navbar.html' %}

<div class="container" style="max-width: 600px; margin-top: 30px;">
    
    <div class="card shadow-sm border-0 rounded-3 p-4 bg-white">
        
        <h3 class="fw-bold mb-4" style="color: #1e293b;">Add New Participant</h3>

        <form method="POST">
            {% csrf_token %}
            
            <div class="mb-3">
                <label class="form-label text-muted small fw-bold mb-1">Name <span class="text-danger">*</span></label>
                <input type="text" name="name" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label text-muted small fw-bold mb-1">Date of Birth <span class="text-secondary fw-normal">(Optional)</span></label>
                <input type="date" id="dobInput" name="dob" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label text-muted small fw-bold mb-1">Age <span class="text-danger">*</span></label>
                <input type="number" id="ageInput" name="age" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label text-muted small fw-bold mb-1">Gender <span class="text-danger">*</span></label>
                <select name="gender" class="form-select" required>
                    <option value="" disabled selected>Select</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label text-muted small fw-bold mb-1">District</label>
                <input type="text" name="district" class="form-control" value="{{ district_name }}" readonly tabindex="-1">
            </div>

            <div class="mb-3">
                <label class="form-label text-muted small fw-bold mb-1">Contact <span class="text-danger">*</span></label>
                <input type="tel" name="contact" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label text-muted small fw-bold mb-1">Age Group <span class="text-danger">*</span></label>
                <select name="age_group" class="form-select" required>
                    <option value="" disabled selected>Select</option>
                    <option value="U14">Under 14</option>
                    <option value="U18">Under 18</option>
                    <option value="O18">Over 18</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label text-muted small fw-bold mb-1">Weight Category <span class="text-danger">*</span></label>
                <select name="weight_category" class="form-select" required>
                    <option value="" disabled selected>Select</option>
                    <option value="-21">-21 Kg</option>
                    <option value="-25">-25 Kg</option>
                    <option value="-29">-29 Kg</option>
                    <option value="-33">-33 Kg</option>
                    <option value="-37">-37 Kg</option>
                    <option value="-40">-40 Kg</option>
                    <option value="-41">-41 Kg</option>
                    <option value="-44">-44 Kg</option>
                    <option value="-45">-45 Kg</option>
                    <option value="-49">-49 Kg</option>
                    <option value="-52">-52 Kg</option>
                    <option value="-53">-53 Kg</option>
                    <option value="-56">-56 Kg</option>
                    <option value="-75">-75 Kg</option>
                    <option value="+53">+53 Kg</option>
                </select>
            </div>

            <div class="mb-4">
                <label class="form-label text-muted small fw-bold mb-1">Event Type <span class="text-danger">*</span></label>
                <select name="event_type" class="form-select" required>
                    <option value="" disabled selected>Select</option>
                    <option value="Phunaba-Ama">Phunaba-Ama</option>
                    <option value="Phunaba-Anishuba">Phunaba-Anishuba</option>
                </select>
            </div>

            <div class="d-flex justify-content-between align-items-center mt-2">
                <a href="{% url 'manage-participants-coach' %}" class="text-muted text-decoration-none small">← Back</a>
                <button type="submit" class="btn btn-success fw-bold px-4 shadow-sm" style="background-color: #198754; border: none;">
                    Save Participant
                </button>
            </div>

        </form>
    </div>
</div>

<div class="toast-container position-fixed top-0 end-0 p-4" style="z-index: 1055;">
    <div id="systemToast" class="toast align-items-center border-0 shadow-lg" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body fw-bold fs-6" id="toastBody">
                </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // ==========================================
    // 🔔 GLOBAL NOTIFICATION CONTROLLER
    // ==========================================
    function showToast(message, type = 'success') {
        const toastEl = document.getElementById('systemToast');
        const toastBody = document.getElementById('toastBody');
        
        // Wipe old colors and apply the new one (danger for errors, success for good things)
        toastEl.className = `toast align-items-center border-0 shadow-lg text-bg-${type}`;
        toastBody.innerText = message;
        
        // Fire the Toast!
        const toast = new bootstrap.Toast(toastEl, { delay: 4000 });
        toast.show();
    }

    document.addEventListener("DOMContentLoaded", function() {
        
        // 🚨 Catch Django Backend Messages automatically!
        {% if messages %}
            {% for message in messages %}
                // Convert Django's "error" tag to Bootstrap's "danger" color
                let msgType = "{{ message.tags }}" === "error" ? "danger" : "{{ message.tags|default:'info' }}";
                showToast("{{ message|escapejs }}", msgType);
            {% endfor %}
        {% endif %}


        const dobInput = document.getElementById('dobInput');
        const ageInput = document.getElementById('ageInput');
        const ageGroupField = document.querySelector('select[name="age_group"]');
        const contactField = document.querySelector('input[name="contact"]');

        // ==========================================
        // 1. DATE OF BIRTH LOGIC
        // ==========================================
        if (dobInput && ageInput) {
            dobInput.addEventListener('change', function() {
                if (!this.value) return; 

                const dob = new Date(this.value);
                if (!isNaN(dob.getTime())) {
                    const today = new Date();
                    let age = today.getFullYear() - dob.getFullYear();
                    const m = today.getMonth() - dob.getMonth();
                    
                    if (m < 0 || (m === 0 && today.getDate() < dob.getDate())) {
                        age--;
                    }

                    ageInput.value = age;
                    ageInput.dispatchEvent(new Event('input'));
                }
            });
        }

        // ==========================================
        // 2. AGE & AUTO-SELECTOR LOGIC
        // ==========================================
        if (ageInput && ageGroupField) {
            ageInput.setAttribute('min', '1');

            ageInput.addEventListener('input', function() {
                if (this.value !== "") {
                    const age = parseInt(this.value);
                    
                    if (age < 1) {
                        // 🚨 THE FIX: Beautiful Toast instead of ugly alert!
                        showToast("Invalid Age. Participant must be at least 1 year old.", "danger");
                        this.value = ''; 
                        ageGroupField.value = ''; 
                        if (dobInput) dobInput.value = ''; 
                        return;
                    }

                    if (!isNaN(age)) {
                        if (age < 14) {
                            ageGroupField.value = 'U14'; 
                        } else if (age >= 14 && age < 18) {
                            ageGroupField.value = 'U18';
                        } else if (age >= 18) {
                            ageGroupField.value = 'O18';
                        }
                    }
                } else {
                    ageGroupField.value = ''; 
                }
            });
        }

        // ==========================================
        // 3. CONTACT NUMBER LOGIC
        // ==========================================
        if (contactField) {
            contactField.setAttribute('maxlength', '10');
            contactField.setAttribute('minlength', '10');
            contactField.setAttribute('pattern', '\\d{10}');
            contactField.setAttribute('title', 'Please enter exactly 10 digits');

            contactField.addEventListener('input', function(e) {
                this.value = this.value.replace(/\D/g, '');
            });
        }
    });
</script>

</body>
</html>

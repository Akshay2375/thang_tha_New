<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delete Participant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="min-height: 100vh;">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-danger">
                <div class="card-header bg-danger text-white py-3">
                    <h5 class="m-0 fw-bold">⚠️ Confirm Deletion</h5>
                </div>
                <div class="card-body p-4 text-center">
                    <h4 class="mb-3">Are you absolutely sure?</h4>
                    <p class="text-muted">You are about to delete the participant:</p>
                    <p class="fs-5 fw-bold text-dark">{{ object.name }} ({{ object.district }})</p>
                    <p class="text-danger small mb-4">This action cannot be undone.</p>
                    
                    <form method="POST">
                        {% csrf_token %}
                        <a href="{% url 'participant-list' %}" class="btn btn-outline-secondary px-4 me-2">Cancel</a>
                        <button type="submit" class="btn btn-danger px-4 fw-bold">Yes, Delete Participant</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>

<h1>Tournament Management</h1>
<a href="{% url 'tournament-add' %}" style="display:inline-block; margin-bottom: 20px; padding: 10px; background: blue; color: white;">+ Create New Tournament</a>

<table border="1" cellpadding="10">
    <tr>
        <th>Name</th>
        <th>Dates</th>
        <th>Location</th>
        <th>Actions</th>
    </tr>
    {% for tournament in tournaments %}
    <tr>
        <td>{{ tournament.name }}</td>
        <td>{{ tournament.start_date }} to {{ tournament.end_date }}</td>
        <td>{{ tournament.location }}</td>
        <td>
            <a href="{% url 'tournament-delete' tournament.id %}" style="color: red;">Delete</a>
        </td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="4">No tournaments created yet.</td>
    </tr>
    {% endfor %}
</table>

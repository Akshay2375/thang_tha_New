<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ring {{ match.ring_number }} - select corner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white d-flex align-items-center justify-content-center" style="height: 100vh; margin: 0;">

<div class="container text-center px-4">
    <h4 class="text-muted mb-4 fw-bold">RING {{ match.ring_number }} • MATCH {{ match.match_sequence }}</h4>
    
    <div class="card bg-white text-dark p-4 shadow-lg mx-auto" style="border-radius: 20px; max-width: 500px;">
        <h2 class="fw-bold mb-4">select your seating position:</h2>
        
        <div class="d-flex flex-column gap-3">
            <a href="{% url 'scorer-panel' match.id %}?corner=red" class="btn btn-danger btn-lg py-4 fs-4 fw-bold shadow" style="border-radius: 15px;">
                🥊 SCORE RED CORNER
                <br><small class="text-light fs-6">{{ match.participant_red.name }}</small>
            </a>
            
            {% if match.participant_blue %}
            <a href="{% url 'scorer-panel' match.id %}?corner=blue" class="btn btn-primary btn-lg py-4 fs-4 fw-bold shadow" style="border-radius: 15px;">
                🥊 SCORE BLUE CORNER
                <br><small class="text-light fs-6">{{ match.participant_blue.name }}</small>
            </a>
            {% endif %}
        </div>
    </div>
    
    <div class="mt-5">
        <a href="{% url 'scorer-dashboard' %}" class="btn btn-outline-secondary px-4 py-2 fw-bold">← Back to dashboard</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

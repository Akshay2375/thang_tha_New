<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Ring - {{ tournament.name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">

{% include 'partials/navbar.html' %}

<div class="container" style="max-width: 600px; margin-top: 50px;">
    <div class="card shadow-sm border-0 rounded-4 p-5 text-center">
        <h2 class="fw-bold mb-2">Select Your Ring</h2>
        <p class="text-muted mb-4 fs-5">{{ tournament.name }}</p>
        
        <form method="POST">
            {% csrf_token %}
            <div class="d-grid gap-3">
                <button type="submit" name="ring_number" value="1" class="btn btn-primary btn-lg fw-bold shadow-sm py-3">Enter Ring 1</button>
                <button type="submit" name="ring_number" value="2" class="btn btn-primary btn-lg fw-bold shadow-sm py-3">Enter Ring 2</button>
                <button type="submit" name="ring_number" value="3" class="btn btn-primary btn-lg fw-bold shadow-sm py-3">Enter Ring 3</button>
                <button type="submit" name="ring_number" value="4" class="btn btn-primary btn-lg fw-bold shadow-sm py-3">Enter Ring 4</button>
            </div>
        </form>
        
        <a href="{% url 'tournament-dashboard' %}" class="btn btn-outline-secondary mt-4">← Back to Dashboard</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

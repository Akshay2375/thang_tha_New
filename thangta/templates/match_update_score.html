<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Declare Winner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4 d-flex align-items-center justify-content-center" style="height: 100vh;">

<div class="card shadow-lg border-0" style="max-width: 500px; width: 100%; border-radius: 15px;">
    <div class="card-body p-5 text-center">
        <h2 class="fw-bold mb-4">Declare Winner</h2>
        <p class="text-muted mb-4">{{ match.full_category_name }}</p>

        <form method="POST" action="{% url 'update-match-winner' match.id %}">
            {% csrf_token %}
            
            <div class="d-grid gap-3">
                <button type="submit" name="winner_id" value="{{ match.participant_red.id }}" class="btn btn-outline-danger btn-lg py-3 px-4 fw-bold fs-4 d-flex justify-content-between align-items-center">
                    <span>🏆 {{ match.participant_red.name }}</span>
                    <span class="badge bg-danger fs-5">{{ red_score }} PTS</span>
                </button>

                {% if match.participant_blue %}
                <div class="text-muted fw-bold my-2">OR</div>

                <button type="submit" name="winner_id" value="{{ match.participant_blue.id }}" class="btn btn-outline-primary btn-lg py-3 px-4 fw-bold fs-4 d-flex justify-content-between align-items-center">
                    <span>🏆 {{ match.participant_blue.name }}</span>
                    <span class="badge bg-primary fs-5">{{ blue_score }} PTS</span>
                </button>
                {% endif %}
            </div>
        </form>
        
        <div class="mt-4">
            <a href="javascript:history.back()" class="btn btn-link text-muted">Cancel and go back to live match</a>
        </div>
    </div>
</div>

</body>
</html>

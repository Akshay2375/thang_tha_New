<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Scorer Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <h2 class="fw-bold m-0">📱 Scorer Dashboard</h2>
        <a href="{% url 'tournament-dashboard' %}" class="btn btn-outline-dark shadow-sm">← Back to Main Menu</a>
    </div>
    
    <h4 class="mb-4 text-muted">Select your assigned Ring:</h4>
    
    <div class="row">
        {% for tournament in live_tournaments %}
        <div class="col-md-6 mb-4">
            <div class="card shadow-sm border-primary h-100">
                <div class="card-body p-4 text-center">
                    <h4 class="fw-bold text-dark mb-1">{{ tournament.name }}</h4>
                    <p class="text-muted small mb-4">Which ring are you scoring?</p>
                    
                    <div class="d-flex justify-content-center gap-3">
                        <a href="{% url 'scorer-ring-matches' tournament.id 1 %}" class="btn btn-primary btn-lg px-5 py-3 fw-bold shadow-sm">Ring 1</a>
                        <a href="{% url 'scorer-ring-matches' tournament.id 2 %}" class="btn btn-info text-white btn-lg px-5 py-3 fw-bold shadow-sm">Ring 2</a>
                    </div>
                </div>
            </div>
        </div>
        {% empty %}
        <div class="col-12 text-center py-5">
            <h5 class="text-muted fst-italic">No live tournaments available to score.</h5>
        </div>
        {% endfor %}
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

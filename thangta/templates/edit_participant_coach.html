<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Participant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>input[readonly] { background-color: #f8f9fa !important; cursor: not-allowed; }</style>
</head>
<body class="bg-light p-4">

{% include 'partials/navbar.html' %}

<div class="container" style="max-width: 600px; margin-top: 30px;">
    <div class="card shadow-sm border-0 rounded-3 p-4 bg-white">
        
        <h3 class="fw-bold mb-4" style="color: #1e293b;">Edit Athlete: {{ participant.name }}</h3>

        <form method="POST">
            {% csrf_token %}
            
            <div class="mb-3">
                <label class="form-label text-muted small fw-bold mb-1">Name</label>
                <input type="text" name="name" class="form-control" value="{{ participant.name }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label text-muted small fw-bold mb-1">Date of Birth</label>
                <input type="date" id="dobInput" name="dob" class="form-control" value="{{ participant.date_of_birth|date:'Y-m-d' }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label text-muted small fw-bold mb-1">Age</label>
                <input type="number" id="ageInput" name="age" class="form-control" value="{{ participant.age }}" readonly tabindex="-1">
            </div>

            <div class="mb-3">
                <label class="form-label text-muted small fw-bold mb-1">Gender</label>
                <select name="gender" class="form-select" required>
                    <option value="Male" {% if participant.gender == 'Male' %}selected{% endif %}>Male</option>
                    <option value="Female" {% if participant.gender == 'Female' %}selected{% endif %}>Female</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label text-muted small fw-bold mb-1">District</label>
                <input type="text" name="district" class="form-control" value="{{ district_name }}" readonly tabindex="-1">
            </div>

            <div class="mb-3">
                <label class="form-label text-muted small fw-bold mb-1">Contact</label>
                <input type="tel" name="contact" class="form-control" value="{{ participant.contact }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label text-muted small fw-bold mb-1">Age Group</label>
                <select name="age_group" class="form-select" required>
                    <option value="U14" {% if participant.age_category == 'U14' %}selected{% endif %}>Under 14</option>
                    <option value="U18" {% if participant.age_category == 'U18' %}selected{% endif %}>Under 18</option>
                    <option value="O18" {% if participant.age_category == 'O18' %}selected{% endif %}>Over 18</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label text-muted small fw-bold mb-1">Weight Category</label>
                <select name="weight_category" class="form-select" required>
                    <option value="-21" {% if participant.weight_category == '-21' %}selected{% endif %}>-21 Kg</option>
                    <option value="-25" {% if participant.weight_category == '-25' %}selected{% endif %}>-25 Kg</option>
                    <option value="-29" {% if participant.weight_category == '-29' %}selected{% endif %}>-29 Kg</option>
                    <option value="-33" {% if participant.weight_category == '-33' %}selected{% endif %}>-33 Kg</option>
                    <option value="-37" {% if participant.weight_category == '-37' %}selected{% endif %}>-37 Kg</option>
                    <option value="-40" {% if participant.weight_category == '-40' %}selected{% endif %}>-40 Kg</option>
                    <option value="-41" {% if participant.weight_category == '-41' %}selected{% endif %}>-41 Kg</option>
                    <option value="-44" {% if participant.weight_category == '-44' %}selected{% endif %}>-44 Kg</option>
                    <option value="-45" {% if participant.weight_category == '-45' %}selected{% endif %}>-45 Kg</option>
                    <option value="-49" {% if participant.weight_category == '-49' %}selected{% endif %}>-49 Kg</option>
                    <option value="-52" {% if participant.weight_category == '-52' %}selected{% endif %}>-52 Kg</option>
                    <option value="-53" {% if participant.weight_category == '-53' %}selected{% endif %}>-53 Kg</option>
                    <option value="-56" {% if participant.weight_category == '-56' %}selected{% endif %}>-56 Kg</option>
                    <option value="-75" {% if participant.weight_category == '-75' %}selected{% endif %}>-75 Kg</option>
                    <option value="+53" {% if participant.weight_category == '+53' %}selected{% endif %}>+53 Kg</option>
                </select>
            </div>

            <div class="mb-4">
                <label class="form-label text-muted small fw-bold mb-1">Event Type</label>
                <select name="event_type" class="form-select" required>
                    <option value="Phunaba-Ama" {% if participant.event_type == 'Phunaba-Ama' %}selected{% endif %}>Phunaba-Ama</option>
                    <option value="Phunaba-Anishuba" {% if participant.event_type == 'Phunaba-Anishuba' %}selected{% endif %}>Phunaba-Anishuba</option>
                </select>
            </div>

            <div class="d-flex justify-content-between align-items-center mt-2">
                <a href="{% url 'manage-participants-coach' %}" class="text-muted text-decoration-none small">← Cancel</a>
                <button type="submit" class="btn btn-primary fw-bold px-4 shadow-sm" style="background-color: #3b71ca; border: none;">
                    Save Changes
                </button>
            </div>

        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Keep the Age Auto-Calculator!
    document.getElementById('dobInput').addEventListener('change', function() {
        const dob = new Date(this.value);
        if (!isNaN(dob.getTime())) {
            const today = new Date();
            let age = today.getFullYear() - dob.getFullYear();
            const m = today.getMonth() - dob.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < dob.getDate())) {
                age--;
            }
            document.getElementById('ageInput').value = age;
        } else {
            document.getElementById('ageInput').value = '';
        }
    });
</script>
</body>
</html>

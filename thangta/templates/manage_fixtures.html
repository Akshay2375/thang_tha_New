<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Generate Fixtures - {{ tournament.name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">

{% include 'partials/navbar.html' %}

<div class="container max-w-4xl mx-auto" style="max-width: 900px;">
    
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold m-0">⚙️ Generate Fixtures</h2>
            <p class="text-muted fs-5 m-0">{{ tournament.name }}</p>
        </div>
        <a href="{% url 'tournament-matches' tournament.id %}" class="btn btn-outline-dark shadow-sm">← Back to Fixtures</a>
    </div>

    <div class="row">
        <div class="col-md-6 mb-4">
            <div class="card shadow-sm border-0 rounded-3 overflow-hidden">
                <div class="card-header bg-primary text-white py-3 border-0">
                    <h5 class="m-0 fw-bold">Setup Bracket Category</h5>
                </div>
                <div class="card-body p-4 bg-white">
                    <form method="POST">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">Tournament</label>
                            <input type="text" class="form-control fw-bold bg-light" value="{{ tournament.name }}" disabled>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">Event Type</label>
                            <select name="event_type" class="form-select" required>
                                <option value="" disabled selected>Select Event</option>
                                <option value="Phunaba-Ama">Phunaba-Ama</option>
                                <option value="Phunaba-Anishuba">Phunaba-Anishuba</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">Gender</label>
                            <select name="gender" class="form-select" required>
                                <option value="" disabled selected>Select Gender</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">Age Category</label>
                            <select name="age_category" class="form-select" required>
                                <option value="" disabled selected>Select Age Group</option>
                                <option value="U14">Under 14</option>
                                <option value="U18">Under 18</option>
                                <option value="O18">Over 18</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">Weight Category</label>
                            <select name="weight_category" class="form-select" required>
                                <option value="" disabled selected>Select Weight</option>
                                <option value="-21">-21 Kg</option>
                                <option value="-25">-25 Kg</option>
                                <option value="-29">-29 Kg</option>
                                <option value="-33">-33 Kg</option>
                                <option value="-37">-37 Kg</option>
                                <option value="-40">-40 Kg</option>
                                <option value="-41">-41 Kg</option>
                                <option value="-44">-44 Kg</option>
                                <option value="-45">-45 Kg</option>
                                <option value="-49">-49 Kg</option>
                                <option value="-52">-52 Kg</option>
                                <option value="-53">-53 Kg</option>
                                <option value="-56">-56 Kg</option>
                                <option value="-75">-75 Kg</option>
                                <option value="+53">+53 Kg</option>
                            </select>
                        </div>

                      <div class="mb-3">
    <label class="form-label fw-bold text-muted small">Assign to Ring Number</label>
    
    <input type="text" class="form-control" value="Ring {{ ring_number }}" readonly style="background-color: #f8f9fa; cursor: not-allowed;">
    
    <input type="hidden" name="ring_number" value="{{ ring_number }}">
</div>

                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm">Generate Round 1</button>
                    </form>
                </div>
            </div>
        </div>
 
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

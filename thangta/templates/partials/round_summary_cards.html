<div class="bg-light p-4 rounded shadow-sm mb-4" style="border: 1px solid #e2e8f0;">
    <h5 class="fw-bold text-dark mb-4">
        <img src="https://img.icons8.com/color/48/combo-chart--v1.png" alt="chart" style="width: 24px; margin-right: 8px; vertical-align: text-bottom;"/>
        Round-wise Totals
    </h5>
    
    {% for rs in round_summary %}
    <div class="card mb-3 border-0 shadow-sm" style="border-left: 5px solid #22c55e !important; border-radius: 8px;">
        <div class="card-body d-flex justify-content-between align-items-center py-3 px-4 bg-white" style="border-radius: 0 8px 8px 0;">
            
            <div class="d-flex align-items-center gap-3">
                {% if rs.status == 'Completed' %}
                    <div class="bg-success text-white rounded d-flex align-items-center justify-content-center shadow-sm" style="width: 26px; height: 26px; font-size: 1.2rem;">✓</div>
                {% else %}
                    <div class="rounded-circle shadow-sm" style="width: 20px; height: 20px; margin-left: 3px; background: radial-gradient(circle at 30% 30%, #86efac, #22c55e);"></div>
                {% endif %}
                <div>
                    <h5 class="mb-0 fw-bold text-dark">Round {{ rs.round }}</h5>
                    <small class="text-muted">{{ rs.status }}</small>
                </div>
            </div>
            
            <div class="d-flex gap-5 text-center align-items-center me-3">
                <div>
                    <h4 class="mb-0 fw-bold text-danger">{{ rs.red_total }}</h4>
                    <small class="text-danger fw-bold text-uppercase" style="font-size: 0.7rem;">RED</small>
                </div>
                {% if match.participant_blue %}
                <div>
                    <h4 class="mb-0 fw-bold text-primary">{{ rs.blue_total }}</h4>
                    <small class="text-primary fw-bold text-uppercase" style="font-size: 0.7rem;">BLUE</small>
                </div>
                {% endif %}
            </div>
            
        </div>
    </div>
    {% endfor %}
</div>

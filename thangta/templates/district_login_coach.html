<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Coach Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">

{% include 'partials/navbar.html' %}

<div class="container" style="max-width: 500px; margin-top: 80px;">
    <div class="card shadow-sm border-0 rounded-4 p-5">
        <h2 class="fw-bold text-center mb-1">Coach Access</h2>
        <p class="text-muted text-center mb-4">Select your district to manage athletes</p>
        
        <form method="POST">
            {% csrf_token %}
            
            <div class="mb-4">
                <label class="form-label fw-bold text-muted small">Select District</label>
                <select name="district_id" class="form-select form-select-lg" required>
                    <option value="" disabled selected>Choose District...</option>
                    {% for d in districts %}
                        <option value="{{ d.id }}">{{ d.name }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="mb-4">
                <label class="form-label fw-bold text-muted small">Access Code</label>
                <input type="password" name="access_code" class="form-control form-control-lg" placeholder="Enter secret code" required>
            </div>
            
            <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm">Enter Portal</button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

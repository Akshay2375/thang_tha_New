{% load widget_tweaks %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Thang-Ta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="min-height: 100vh;">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white text-center py-3">
                    <h4 class="m-0 fw-bold">Thang-Ta Portal</h4>
                </div>
                <div class="card-body p-4">
                    <h5 class="text-center mb-4">Please Log In</h5>
                    
                    {% if form.errors %}
                        <div class="alert alert-danger small">
                            Invalid username or password. Please try again.
                        </div>
                    {% endif %}

                    <form method="POST">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Username</label>
                            {{ form.username|add_class:"form-control" }}
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label fw-bold">Password</label>
                            {{ form.password|add_class:"form-control" }}
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100 fw-bold">Log In</button>
                    </form>
                </div>
            </div>
            <div class="text-center mt-3">
                <a href="{% url 'tournament-dashboard' %}" class="text-decoration-none text-muted">← Back to Dashboard</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
